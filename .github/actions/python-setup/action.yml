name: Reusable Setup UV
description: Reusable workflow to setup uv environment

inputs:
    python-version:
      description: The Python version to set up
      required: true
    os:
      description: The operating system to set up
      required: true
    exclude-packages:
      description: Space-separated list of packages to exclude from uv sync
      required: false
      default: ''

runs:
    using: "composite"
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
            version-file: "python/pyproject.toml"
            enable-cache: true
            cache-suffix: ${{ inputs.os }}-${{ inputs.python-version }}
            cache-dependency-glob: "**/uv.lock"
      - name: Install the project
        shell: bash
        run: |
          EXCLUDE_ARGS=""
          for pkg in ${{ inputs.exclude-packages }}; do
            EXCLUDE_ARGS="$EXCLUDE_ARGS --no-install-package $pkg"
          done
          cd python && uv sync --all-packages --all-extras --dev -U --prerelease=if-necessary-or-explicit $EXCLUDE_ARGS
